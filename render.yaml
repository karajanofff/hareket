services:
  - type: web
    name: road-rules-video-platform
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: road-rules-video-platform-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true

databases:
  - name: road-rules-video-platform-db
    plan: free
